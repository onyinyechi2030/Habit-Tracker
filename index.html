<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Daily Habit Tracker</title>
<style>
body{font-family:Arial,sans-serif;margin:0;background:#f5f5f5}header{background:#4caf50;color:#fff;padding:1rem;text-align:center}nav{display:flex;flex-wrap:wrap;background:#333}nav button{flex:1;padding:10px;color:#fff;background:#333;border:none;cursor:pointer}nav button.active{background:#4caf50}.tab-content{display:none;padding:20px}.tab-content.active{display:block}.form-section{margin-bottom:1rem}label{display:block;margin:.5rem 0 .25rem;font-weight:bold}input[type=text],input[type=number],input[type=date],input[type=time],input[type=password],input[type=email],textarea,select{width:100%;padding:.5rem;border:1px solid #ccc;border-radius:4px} .small-input{max-width:150px}.button-row{margin-top:1rem}button.save-btn{background:#4caf50;color:#fff;border:none;padding:10px 20px;margin-right:10px;cursor:pointer;border-radius:4px}button.save-btn:hover{background:#45a049}.notes{width:100%;height:60px}.subgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}.status{margin-top:10px;color:#333;white-space:pre-wrap}
</style></head><body>
<header><h1>Daily Habit Tracker</h1></header>
<nav>
<button data-tab="dailyTab" class="active">Daily</button><button data-tab="dietTab">Diet</button><button data-tab="exerciseTab">Exercise</button><button data-tab="prayerTab">Prayer</button><button data-tab="studyTab">Study</button><button data-tab="sleepTab">Sleep</button><button data-tab="dashboardTab">Dashboard</button><button data-tab="syncTab">Sync</button>
</nav>
<div id="dailyTab" class="tab-content active"><h2>Daily Setup</h2><div class="form-section"><label for="date">Select Date:</label><input type="date" id="date"/></div><div class="form-section"><label for="daily-notes">General Notes:</label><textarea id="daily-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Daily Data</button></div><p id="status" class="status"></p></div>
<div id="dietTab" class="tab-content"><h2>Diet</h2><div class="form-section"><label for="diet-quality">How healthy was your diet?</label><select id="diet-quality"><option>Excellent</option><option selected>Good</option><option>Fair</option><option>Poor</option></select></div><div class="subgrid"><div><label for="water-intake">Water intake (glasses):</label><input type="number" id="water-intake" class="small-input" min="0"/></div><div><label for="sugar-intake">Sugary snacks/drinks (count):</label><input type="number" id="sugar-intake" class="small-input" min="0"/></div><div><label for="alcohol-intake">Alcohol (drinks):</label><input type="number" id="alcohol-intake" class="small-input" min="0"/></div><div><label for="fruit-veggie">Fruit/Vegetable servings:</label><input type="number" id="fruit-veggie" class="small-input" min="0"/></div><div><label for="no-junk">No junk food/snacks?</label><select id="no-junk"><option selected>Yes</option><option>No</option></select></div></div><div class="form-section"><label for="diet-notes">Diet Notes:</label><textarea id="diet-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Diet Data</button></div></div>
<div id="exerciseTab" class="tab-content"><h2>Exercise</h2><p>Weekly goal: At least 120 minutes per day of exercise for at least 5 days in the week.</p><div class="subgrid"><div><label for="exercise-mins">Total exercise (mins):</label><input type="number" id="exercise-mins" class="small-input" min="0"/></div><div><label for="cardio-mins">Cardio (mins):</label><input type="number" id="cardio-mins" class="small-input" min="0"/></div><div><label for="walk-mins">Walking (mins):</label><input type="number" id="walk-mins" class="small-input" min="0"/></div><div><label for="strength-mins">Strength (mins):</label><input type="number" id="strength-mins" class="small-input" min="0"/></div><div><label for="yoga-mins">Yoga (mins):</label><input type="number" id="yoga-mins" class="small-input" min="0"/></div></div><div class="form-section"><label for="exercise-notes">Exercise Notes:</label><textarea id="exercise-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Exercise Data</button></div></div>
<div id="prayerTab" class="tab-content"><h2>Prayer & Meditation</h2><div class="subgrid"><div><label for="morning-prayer">Morning Prayer</label><select id="morning-prayer"><option>None</option><option>Short</option><option>Regular</option><option>Extended</option></select></div><div><label for="evening-prayer">Evening Prayer</label><select id="evening-prayer"><option>None</option><option>Short</option><option>Regular</option><option>Extended</option></select></div><div><label for="examen">Examen</label><select id="examen"><option>No</option><option>Partial</option><option>Complete</option></select></div><div><label for="scripture">Scripture</label><select id="scripture"><option>No</option><option>Yes</option></select></div><div><label for="rosary">Rosary</label><select id="rosary"><option>No</option><option>Partial</option><option>Complete</option></select></div><div><label for="meditation">Meditation/Contemplation</label><select id="meditation"><option>No</option><option>Short</option><option>Regular</option><option>Extended</option></select></div></div><div class="form-section"><label for="prayer-notes">Prayer Notes:</label><textarea id="prayer-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Prayer Data</button></div></div>
<div id="studyTab" class="tab-content"><h2>Study</h2><div class="subgrid"><div><label for="study-planned">Planned study time (mins):</label><input type="number" id="study-planned" class="small-input" min="0"/></div><div><label for="study-actual">Actual study time (mins):</label><input type="number" id="study-actual" class="small-input" min="0"/></div><div><label for="study-focus">Focus level (1-5):</label><input type="number" id="study-focus" class="small-input" min="1" max="5"/></div><div><label for="study-topic">Subject/Topic:</label><input type="text" id="study-topic"/></div><div><label for="study-type">Type of Study:</label><select id="study-type"><option>Reading</option><option>Practice</option><option>Research</option><option>Project</option></select></div><div><label for="study-pages">Pages/Units completed:</label><input type="text" id="study-pages"/></div><div><label for="study-task-completed">Task Completed?</label><select id="study-task-completed"><option>Yes</option><option>Partially</option><option selected>No</option></select></div><div><label for="study-comprehension">Comprehension (1-5):</label><input type="number" id="study-comprehension" class="small-input" min="1" max="5"/></div><div><label for="study-distraction">Distraction Level (1-5):</label><input type="number" id="study-distraction" class="small-input" min="1" max="5"/></div></div><div class="form-section"><label for="study-notes">Study Notes:</label><textarea id="study-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Study Data</button></div></div>
<div id="sleepTab" class="tab-content"><h2>Sleep</h2><div class="subgrid"><div><label for="bed-time">Bed time:</label><input type="time" id="bed-time" class="small-input"/></div><div><label for="wake-time">Wake up time:</label><input type="time" id="wake-time" class="small-input"/></div><div><label for="sleep-hours">Total hours slept:</label><input type="number" id="sleep-hours" class="small-input" min="0" step="0.25"/></div><div><label for="sleep-quality">Sleep quality (1-5):</label><input type="number" id="sleep-quality" class="small-input" min="1" max="5"/></div><div><label for="sleep-interruptions">Interruptions (count):</label><input type="number" id="sleep-interruptions" class="small-input" min="0"/></div><div><label for="sleep-onset">Time to fall asleep (mins):</label><input type="number" id="sleep-onset" class="small-input" min="0"/></div></div><div class="form-section"><label for="sleep-notes">Sleep Notes:</label><textarea id="sleep-notes" class="notes"></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveDay()">Save Sleep Data</button></div></div>
<div id="dashboardTab" class="tab-content"><h2>Dashboard</h2><div id="dashboard-content"></div><div class="button-row"><button class="save-btn" type="button" onclick="generateDashboard()">Generate Summary</button></div></div>
<div id="syncTab" class="tab-content"><h2>Sync</h2><div class="form-section"><label for="firebaseConfig">Firebase Config (JSON):</label><textarea id="firebaseConfig" class="notes" placeholder='{"apiKey":"...","authDomain":"..."}'></textarea></div><div class="button-row"><button class="save-btn" type="button" onclick="saveFirebaseConfig()">Save Firebase config</button></div><div class="subgrid"><div><label for="sync-email">Email</label><input type="email" id="sync-email"/></div><div><label for="sync-password">Password</label><input type="password" id="sync-password"/></div></div><div class="button-row"><button class="save-btn" type="button" onclick="createAccount()">Create account</button><button class="save-btn" type="button" onclick="signIn()">Sign in</button><button class="save-btn" type="button" onclick="signOutUser()">Sign out</button></div><p id="sync-status" class="status"></p></div>
<script type="module">
import { initializeApp, getApps } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
import { getFirestore, doc, setDoc, getDoc, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
let app=null, auth=null, db=null, currentUser=null;
const by=id=>document.getElementById(id), val=id=>by(id).value, num=id=>{const v=parseFloat(by(id).value);return Number.isFinite(v)?v:0}, intv=id=>{const v=parseInt(by(id).value);return Number.isFinite(v)?v:null};
const dateInput=by('date'); dateInput.value=new Date().toISOString().split('T')[0];
document.querySelectorAll('nav button').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));btn.classList.add('active');by(btn.dataset.tab).classList.add('active')}));
function setStatus(m){by('status').textContent=m} function setSync(m){by('sync-status').textContent=m}
window.saveFirebaseConfig=()=>{try{const cfg=JSON.parse(by('firebaseConfig').value.trim());localStorage.setItem('firebaseConfig',JSON.stringify(cfg));initFirebase();setSync('Firebase config saved.')}catch(e){setSync('Invalid Firebase config JSON.')}};
function initFirebase(){const t=localStorage.getItem('firebaseConfig'); if(!t) return; const cfg=JSON.parse(t); app=getApps().length?getApps()[0]:initializeApp(cfg); auth=getAuth(app); db=getFirestore(app); onAuthStateChanged(auth, async user=>{ currentUser=user||null; setSync(user?`Signed in as ${user.email}`:'Signed out'); if(user) await loadSelectedDate(true); });}
window.createAccount=async()=>{ if(!auth) return setSync('Save Firebase config first.'); try{await createUserWithEmailAndPassword(auth, by('sync-email').value, by('sync-password').value)}catch(e){setSync(e.message)}};
window.signIn=async()=>{ if(!auth) return setSync('Save Firebase config first.'); try{await signInWithEmailAndPassword(auth, by('sync-email').value, by('sync-password').value)}catch(e){setSync(e.message)}};
window.signOutUser=async()=>{ if(auth) await signOut(auth); };
function keyForDate(d){return `habitData-${d}`}
function collect(){return {date:dateInput.value,daily:{notes:val('daily-notes')},diet:{quality:val('diet-quality'),waterIntake:num('water-intake'),sugarIntake:num('sugar-intake'),alcoholIntake:num('alcohol-intake'),fruitVeggie:num('fruit-veggie'),noJunk:val('no-junk'),notes:val('diet-notes')},exercise:{totalMins:num('exercise-mins'),cardioMins:num('cardio-mins'),walkMins:num('walk-mins'),strengthMins:num('strength-mins'),yogaMins:num('yoga-mins'),notes:val('exercise-notes')},prayer:{morning:val('morning-prayer'),evening:val('evening-prayer'),examen:val('examen'),scripture:val('scripture'),rosary:val('rosary'),meditation:val('meditation'),notes:val('prayer-notes')},study:{plannedMins:num('study-planned'),actualMins:num('study-actual'),focus:intv('study-focus'),topic:val('study-topic'),type:val('study-type'),pages:val('study-pages'),taskCompleted:val('study-task-completed'),comprehension:intv('study-comprehension'),distraction:intv('study-distraction'),notes:val('study-notes')},sleep:{bedTime:val('bed-time'),wakeTime:val('wake-time'),hours:num('sleep-hours'),quality:intv('sleep-quality'),interruptions:intv('sleep-interruptions')||0,onset:num('sleep-onset'),notes:val('sleep-notes')}}}
function populate(d){by('daily-notes').value=d.daily?.notes||''; by('diet-quality').value=d.diet?.quality||'Good'; by('water-intake').value=d.diet?.waterIntake??''; by('sugar-intake').value=d.diet?.sugarIntake??''; by('alcohol-intake').value=d.diet?.alcoholIntake??''; by('fruit-veggie').value=d.diet?.fruitVeggie??''; by('no-junk').value=d.diet?.noJunk||'Yes'; by('diet-notes').value=d.diet?.notes||''; by('exercise-mins').value=d.exercise?.totalMins??''; by('cardio-mins').value=d.exercise?.cardioMins??''; by('walk-mins').value=d.exercise?.walkMins??''; by('strength-mins').value=d.exercise?.strengthMins??''; by('yoga-mins').value=d.exercise?.yogaMins??''; by('exercise-notes').value=d.exercise?.notes||''; by('morning-prayer').value=d.prayer?.morning||'None'; by('evening-prayer').value=d.prayer?.evening||'None'; by('examen').value=d.prayer?.examen||'No'; by('scripture').value=d.prayer?.scripture||'No'; by('rosary').value=d.prayer?.rosary||'No'; by('meditation').value=d.prayer?.meditation||'No'; by('prayer-notes').value=d.prayer?.notes||''; by('study-planned').value=d.study?.plannedMins??''; by('study-actual').value=d.study?.actualMins??''; by('study-focus').value=d.study?.focus??''; by('study-topic').value=d.study?.topic||''; by('study-type').value=d.study?.type||'Reading'; by('study-pages').value=d.study?.pages||''; by('study-task-completed').value=d.study?.taskCompleted||'No'; by('study-comprehension').value=d.study?.comprehension??''; by('study-distraction').value=d.study?.distraction??''; by('study-notes').value=d.study?.notes||''; by('bed-time').value=d.sleep?.bedTime||''; by('wake-time').value=d.sleep?.wakeTime||''; by('sleep-hours').value=d.sleep?.hours??''; by('sleep-quality').value=d.sleep?.quality??''; by('sleep-interruptions').value=d.sleep?.interruptions??''; by('sleep-onset').value=d.sleep?.onset??''; by('sleep-notes').value=d.sleep?.notes||''; }
function clearForm(){document.querySelectorAll('input,textarea').forEach(el=>{if(['date','firebaseConfig','sync-email','sync-password'].includes(el.id)) return; el.value='';}); by('diet-quality').value='Good'; by('no-junk').value='Yes'; by('morning-prayer').value='None'; by('evening-prayer').value='None'; by('examen').value='No'; by('scripture').value='No'; by('rosary').value='No'; by('meditation').value='No'; by('study-type').value='Reading'; by('study-task-completed').value='No';}
async function fetchRemote(date){ if(!db||!currentUser) return null; const snap=await getDoc(doc(db,'users',currentUser.uid,'entries',date)); return snap.exists()?snap.data().data:null; }
async function pushRemote(data){ if(!db||!currentUser) return; await setDoc(doc(db,'users',currentUser.uid,'entries',data.date),{data,updatedAt:serverTimestamp()},{merge:true}); }
window.saveDay=async()=>{ const data=collect(); localStorage.setItem(keyForDate(data.date), JSON.stringify(data)); setStatus('Saved locally.'); if(currentUser){ try{ await pushRemote(data); setStatus('Saved locally and synced to cloud.'); } catch(e){ setStatus('Saved locally. Cloud sync failed: '+e.message); } } };
async function loadSelectedDate(preferCloud=false){ const date=dateInput.value; const localText=localStorage.getItem(keyForDate(date)); let local=localText?JSON.parse(localText):null; let remote=null; if(currentUser){ try{ remote=await fetchRemote(date); if(remote) localStorage.setItem(keyForDate(date), JSON.stringify(remote)); } catch(e){ setStatus('Cloud read failed: '+e.message); } } const data=(preferCloud&&remote)||local||remote; if(data){ populate(data); setStatus(remote?'Loaded cloud data.':'Loaded local data.'); } else { clearForm(); setStatus('No data for selected date.'); } }
window.generateDashboard=()=>{let rows=[]; for(let i=0;i<7;i++){const dt=new Date(dateInput.value); dt.setDate(dt.getDate()-i); const key=keyForDate(dt.toISOString().split('T')[0]); const txt=localStorage.getItem(key); if(txt){const d=JSON.parse(txt); rows.push(`<li>${d.date}: Exercise ${d.exercise?.totalMins||0} mins, Study ${d.study?.actualMins||0} mins, Sleep ${d.sleep?.hours||0} hrs, Rosary ${d.prayer?.rosary||'No'}</li>`);}} by('dashboard-content').innerHTML=rows.length?`<ul>${rows.join('')}</ul>`:'No data available for past week.'; };
dateInput.addEventListener('change', ()=>loadSelectedDate(true)); const savedCfg=localStorage.getItem('firebaseConfig'); if(savedCfg){ by('firebaseConfig').value=savedCfg; initFirebase(); } loadSelectedDate(false);
</script></body></html>
